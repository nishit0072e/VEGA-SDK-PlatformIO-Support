name: Vega PlatformIO CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # 1. Match our DevContainer environment perfectly
    runs-on: ubuntu-22.04 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. NEW: Install the underlying C-libraries the compiler needs to run
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses5 libtinfo5 libusb-1.0-0-dev libc6-i386

    - name: Prepare /opt/vega
      run: |
        sudo mkdir -p /opt/vega
        sudo chown -R $USER:$USER /opt/vega

    - name: Setup Vega SDK
      run: |
        git clone https://gitlab.com/riscv-vega/community/vega-sdk.git /opt/vega/vega-sdk
        cd /opt/vega/vega-sdk
        git checkout aries
        chmod +x setup.sh
        ./setup.sh

    - name: Setup Vega Toolchain
      run: |
        git clone https://gitlab.com/riscv-vega/community/vega-tools-rv32.git /opt/vega/vega-tools-rv32
        cd /opt/vega/vega-tools-rv32
        chmod +x setup-env.sh
        ./setup-env.sh
        
        # Add the toolchain bin to the GitHub runner's system path
        echo "/opt/vega/vega-tools-rv32/toolchain/bin" >> $GITHUB_PATH

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: pip install --upgrade platformio

    - name: Build Project
      run: pio run
