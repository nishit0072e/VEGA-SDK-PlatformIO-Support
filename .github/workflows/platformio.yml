name: Vega PlatformIO CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. NEW: Create the matching /opt/vega directory structure!
    - name: Prepare /opt/vega
      run: |
        sudo mkdir -p /opt/vega
        sudo chown -R $USER:$USER /opt/vega


    # 2. UPDATED: Clone directly into /opt/vega/vega-tools-rv32
    - name: Setup Vega Toolchain
      run: |
        git clone https://gitlab.com/riscv-vega/community/vega-tools-rv32.git /opt/vega/vega-tools-rv32
        cd /opt/vega/vega-tools-rv32
        chmod +x setup-env.sh
        ./setup-env.sh
        
        # Add the toolchain bin to the GitHub runner's system path
        echo "/opt/vega/vega-tools-rv32/toolchain/bin" >> $GITHUB_PATH

        
    # 3. UPDATED: Clone directly into /opt/vega/vega-sdk
    - name: Setup Vega SDK
      run: |
        git clone https://gitlab.com/riscv-vega/community/vega-sdk.git /opt/vega/vega-sdk
        cd /opt/vega/vega-sdk
        git checkout aries
        chmod +x setup.sh
        ./setup.sh

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install PlatformIO
      run: pip install --upgrade platformio

    # 4. Build the project!
    - name: Build Project
      run: pio run
