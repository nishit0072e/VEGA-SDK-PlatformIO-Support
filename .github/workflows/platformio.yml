name: Vega PlatformIO CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. FIX THE ARCHITECTURE TRAP: Deep install of 32-bit Linux execution layers
    - name: Install System Dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y libc6:i386 libstdc++6:i386 libncurses5:i386 libtinfo5 zlib1g:i386 wget unzip tar

    - name: Prepare /opt/vega
      run: |
        sudo mkdir -p /opt/vega
        sudo chown -R $USER:$USER /opt/vega

    - name: Setup Vega SDK
      run: |
        git clone https://gitlab.com/riscv-vega/community/vega-sdk.git /opt/vega/vega-sdk
        cd /opt/vega/vega-sdk
        git checkout aries
        chmod +x setup.sh
        ./setup.sh

    - name: Setup Vega Toolchain
      run: |
        git clone https://gitlab.com/riscv-vega/community/vega-tools-rv32.git /opt/vega/vega-tools-rv32
        cd /opt/vega/vega-tools-rv32
        chmod +x setup-env.sh
        ./setup-env.sh
        
        echo "/opt/vega/vega-tools-rv32/toolchain/bin" >> $GITHUB_PATH

    # 2. FIX THE FOLDER & NAMING TRAPS (Plus Diagnostics)
    - name: Fix Toolchain Paths and Names
      run: |
        # If the script extracted to 'bin' instead of 'toolchain/bin', trick PlatformIO by linking them
        if [ ! -d "/opt/vega/vega-tools-rv32/toolchain/bin" ] && [ -d "/opt/vega/vega-tools-rv32/bin" ]; then
          mkdir -p /opt/vega/vega-tools-rv32/toolchain
          ln -s /opt/vega/vega-tools-rv32/bin /opt/vega/vega-tools-rv32/toolchain/bin
        fi

        cd /opt/vega/vega-tools-rv32/toolchain/bin || echo "Bin folder still missing!"
        
        # If the Linux compiler is named riscv32 instead of riscv64, create symlinks so your Python script works
        if [ -f "riscv32-vega-elf-gcc" ] && [ ! -f "riscv64-vega-elf-gcc" ]; then
            echo "Renaming 32-bit binaries to match Python script..."
            for f in riscv32-*; do ln -s "$f" "${f/riscv32/riscv64}"; done
        fi
        
        # --- DIAGNOSTICS ---
        echo "=== FOLDER CONTENTS ==="
        ls -la
        echo "=== COMPILER CHECK ==="
        file riscv64-vega-elf-gcc || true
        ldd riscv64-vega-elf-gcc || true
        ./riscv64-vega-elf-gcc --version || echo "Compiler failed to execute!"

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: pip install --upgrade platformio

    - name: Build Project
      run: pio run
